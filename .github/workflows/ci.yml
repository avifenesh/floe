name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (workspace)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FLOE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/adr
      FLOE_DB: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --no-fail-fast
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  web:
    name: Web (typescript + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      # `artifact.ts` is generated from Rust and gitignored; regenerate
      # before tsc so the imports resolve.
      - run: cargo run -q -p floe-cli -- schema > schema.json
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Generate FE types
        working-directory: apps/web
        run: npm run gen:types
      - name: tsc (app + e2e)
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Vite build
        working-directory: apps/web
        run: npm run build

  # The Playwright happy-path suite is scaffolded (apps/web/e2e) but
  # not yet wired into required CI — getting Postgres + the Rust
  # server + Vite + a chromium browser reliably up together in
  # Actions is a separate fix. Run locally with `npm run e2e` from
  # apps/web; see apps/web/e2e/README.md.

  schema-drift:
    name: Schema + FE types are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -q -p floe-cli -- schema > schema.json
      - run: cd apps/web && npm ci && npm run gen:types
      - name: Fail if schema or types drifted
        run: |
          if ! git diff --quiet schema.json apps/web/src/types/artifact.ts; then
            echo "::error::schema.json or apps/web/src/types/artifact.ts is stale. Run 'just regen-schema' locally and commit."
            git --no-pager diff schema.json apps/web/src/types/artifact.ts
            exit 1
          fi
